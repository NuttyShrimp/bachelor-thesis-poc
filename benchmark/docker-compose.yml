services:
  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=12w"
      - "--web.enable-admin-api"
    user: "1000:1000"
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus/config:/etc/prometheus
      - ./prometheus/data:/prometheus

  grafana:
    image: grafana/grafana:latest
    user: '1000:1000'
    ports:
      - '3000:3000'
    volumes:
      - ./grafana/config/dashboard.yaml:/etc/grafana/provisioning/dashboards/main.yaml
      - ./grafana/config/datasource.yaml:/etc/grafana/provisioning/datasources/main.yaml
      - ./grafana/config/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
      - cadvisor
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
    - 9080:8080
    volumes:
    - /:/rootfs:ro
    - /var/run:/var/run:rw
    - /sys:/sys:ro
    - /var/lib/docker/:/var/lib/docker:ro

  swift:
    depends_on:
      - cadvisor
    build:
      context: ../swift
      tags:
        - bap/swift:latest
    ports:
      - '8080:8080'
    volumes:
      - ../data:/data
  php-fpm:
    depends_on:
      - cadvisor
    build:
      context: ../php
      target: app
      tags:
        - bap/php-fpm:latest
    expose:
      - '9000'
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: http://localhost:8000
    volumes:
      - ../data:/var/www/data:ro

  php-nginx:
    depends_on:
      - cadvisor
    build:
      context: ../php
      target: web
      tags:
        - bap/php-nginx:latest
    ports:
      - '8000:80'
    depends_on:
      - php-fpm
